name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=HagaSpa&show_icons=true&count_private=true&theme=tokyonight
          path: profile/stats.svg
          token: ${{ secrets.PAT }}

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add profile/
          git diff --cached --quiet || (git commit -m "chore: update github stats" && git push)
